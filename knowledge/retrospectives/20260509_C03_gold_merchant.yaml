topic: "黄金商家联系方式 — deepin-voice-note 便签"
content: |
  ## 实际步骤
  1. 浏览器历史搜"黄金" — 仅 2 次搜索，无后续点击
  2. 邮件搜"黄金" — 零命中
  3. 全局搜 sqlite db → 发现 ~/.local/share/deepin/deepin-voice-note/deepin-voice-note1.0.db
  4. sqlite3 查 vnote_items_tbl → note_id=1: "黄金换现金/张总/136 1281 7854"
  5. 答案: 13612817854
  
  ## 失败尝试
  - 花 10min 在浏览器 autofill/history 搜 — 零命中
  - 花 5min 在 WPS wakuang.wps 搜 — 无关
  - 最后在 deepin-voice-note db 找到
  
  ## 工具坑
  - deepin-voice-note 是 Deepin 自带便签应用，数据在 sqlite db
  - 便签内容含中文，sqlite3 查询需正确 UTF-8 终端
  - 三条便签均创建于 2026-04-17 10:17-10:20 (同一天)
  
  ## 耗时
  ~15 min
