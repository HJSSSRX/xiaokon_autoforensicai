qid: C1
topic: "OS版本识别 — 成功但路径有坑"
content: |
  ## 实际步骤
  1. ewfmount 挂载 E01 → /mnt/e01_pc/ewf1
  2. losetup -P 分区映射 → /dev/loop0p3 (Roota)
  3. mount -o ro,noload /dev/loop0p3 /mnt/pc_root
  4. cat /mnt/pc_root/etc/os-release → PRETTY_NAME="Deepin 23.1"
  
  ## 失败尝试
  - 第一次直接 mount ewf1 整体，报错 "unknown filesystem type" — 必须先用 losetup -P 分区
  - 尝试 mount 不带 noload，WSL 内核不支持 ext4 journal replay，卡住
  
  ## 工具坑
  - WSL 下 ewfmount 需要 libewf 包 (apt install ewf-tools)
  - losetup -P 需要较新内核 (WSL2 kernel 5.15+)
  - mount 必须加 ro,noload 避免 journal replay 改镜像
  
  ## 耗时
  ~5 min (含工具安装)
