topic: "全局教训: 40% 得分率的三大根因"
content: |
  ## 根因 1: AI 软件识别失败 (C6, C7)
  - 浪费 75min 在错误的第三方 AI 客户端清单上
  - 不知道 Deepin 23.1 自带 UOS AI
  - 教训: 先确认系统自带 AI → 再搜第三方
  
  ## 根因 2: VC 容器未攻破 (C8, C9, C10)
  - 3 道题全挂，直接损失 ~15% 得分率
  - 密码在 mobile 检材但没主动去要
  - 教训: 加密容器 → 跨检材找密码是第一优先级
  
  ## 根因 3: 题意误读 (C4, C6)
  - C4: "推广设计图" = 加密 PNG，不是 APP 内 URL
  - C6: "类型" = provider，不是 model_id
  - 教训: 中文题面多义性 → 先想 3 种可能解读再动手
  
  ## 如果重来一次
  1. 先确认系统自带 AI (UOS AI) → 省 75min
  2. 看到 VC → 立即发 question 给 mobile → 省 50min
  3. 看到 .enc + .html → 立即解密 → 省 30min
  4. 总节省 ~155min，得分率可从 40% → ~70%
