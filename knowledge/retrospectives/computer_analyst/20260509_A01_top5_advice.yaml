topic: "给未来 computer_analyst 的 Top 5 建议"
content: |
  ## 1. 必装工具 (含版本)
  - ewf-tools (latest) — EWF/E01 挂载
  - sleuthkit (latest) — mmls 分区表分析
  - sqlite3 (3.40+) — 数据库取证
  - python3 (3.10+) + pycryptodome — 加密解密
  - tesseract-ocr + chi_sim — 图片文字提取
  - veracrypt (1.26+) — 加密容器挂载
  - find + grep + strings — 基础搜索三件套
  
  ## 2. 必读检材路径
  - ~/Downloads/ — 下载的文件 (加密文件+解密器常在此)
  - ~/Documents/ — WPS/文档
  - ~/Desktop/ — 快捷方式+勒索信
  - ~/.config/ — 所有应用配置
  - ~/.deepinwine/ — Wine 应用数据 (Foxmail!)
  - ~/.local/share/deepin/ — Deepin 系统应用数据 (便签/UOS AI)
  - ~/.bash_history — 命令历史 (RAT 执行链)
  
  ## 3. 必避的坑
  - 不要假设 AI 软件是第三方客户端 → 可能是系统自带 UOS AI
  - 看到 .enc + .html 同目录 → 加密+解密对，优先解
  - "不存在" 永远不是 CTF 正确答案
  - mount 必须加 ro,noload
  - PowerShell → WSL 传命令用 .sh 文件，不要 inline
  
  ## 4. 解题优先级
  1. 先挂载镜像 → cat /etc/os-release 确认系统
  2. 全盘搜 *.db + *.enc + *.yaml + *.json
  3. 浏览器历史 + 邮件 → 人物关系图
  4. 加密文件 → 同目录找解密器/密钥
  5. 加密容器 → 跨检材找密码
  
  ## 5. 协作要点
  - 每个发现标注 related_to 角色
  - 看到加密 → 立即发 question 给其他角色
  - 定期 GET /findings?from=other_role 看别人的发现
