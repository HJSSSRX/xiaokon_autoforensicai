qid: C10
topic: "保险柜密码 — VC容器依赖 (密码≠VC密码)"
content: |
  ## 我们答的
  占位符
  
  ## 卡在哪步
  VC 容器未攻破。且需要注意:
  - 保险柜密码 ≠ VC 容器密码
  - VC 密码是 9ed2@99y8.com.cn (加密容器的密码)
  - 保险柜密码是物理保险柜的密码 (在容器内文件中)
  
  ## 当时假设
  保险柜密码 = VC 容器密码 (错误!)
  
  ## 现在回看
  - 两个不同的密码
  - VC 密码用于解密容器
  - 保险柜密码在容器解密后的文件中
  
  ## 正确做法
  ```bash
  veracrypt --mount <container> --password="9ed2@99y8.com.cn" --mount-point=/mnt/vc
  find /mnt/vc -type f -exec cat {} \;
  # 保险柜密码在某个文件内容中
  ```
  
  ## 本质差异
  保险柜密码 ≠ VC 密码，是两个不同概念
  
  ## 耗时
  ~15 min (占位符)
tags: [incorrect_answer, veracrypt, safe_box, concept_confusion]
