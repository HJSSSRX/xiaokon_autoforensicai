topic: "工具坑: ext4 noload 与 WSL 内核兼容性"
content: |
  ## 现象
  mount ext4 分区时报错 "wrong fs type, bad option, bad superblock"
  或 mount 后读取文件卡住/IO error
  
  ## 原因
  - WSL2 内核的 ext4 驱动可能不支持某些 journal 特性
  - 直接 mount 会尝试 journal replay，可能失败或修改镜像
  
  ## 正确做法
  ```bash
  # 必须加 ro,noload 两个选项
  mount -o ro,noload /dev/loop0p3 /mnt/pc_root
  ```
  - ro: 只读，防止任何写入
  - noload: 跳过 journal replay，不修改镜像
  
  ## 影响
  比赛期间花 5min 排查 mount 失败原因
  
  ## 教训
  - 取证 mount 永远用 ro,noload
  - 如果 noload 仍失败 → 检查内核是否支持 ext4 (WSL1 不支持)
  - 备选: 用 ewfexport 转 raw → FTK Imager (Windows GUI)
