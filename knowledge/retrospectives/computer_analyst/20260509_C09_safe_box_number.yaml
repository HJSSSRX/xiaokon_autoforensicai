topic: "保险柜编号 — VC容器依赖 (概念区分)"
content: |
  ## 我们答的
  占位符
  
  ## 卡在哪步
  VC 容器未攻破。且一度混淆了概念:
  - 保险柜 ≠ VeraCrypt 容器
  - 保险柜是物理存放黄金的柜子
  - VC 容器是加密的数字存储
  
  ## 当时假设
  保险柜编号 = VC 容器的卷标或文件名
  
  ## 现在回看
  - VC 密码: 9ed2@99y8.com.cn (来自 mobile 小米便签)
  - 挂载后容器内文件含保险柜编号
  - 保险柜编号可能是数字或字母+数字组合
  
  ## 正确做法
  ```bash
  veracrypt --mount <container> --password="9ed2@99y8.com.cn" --mount-point=/mnt/vc
  ls /mnt/vc/
  cat /mnt/vc/README* /mnt/vc/*.txt
  ```
  
  ## 本质差异
  概念混淆: 保险柜 (物理) ≠ VC 容器 (数字加密)
  
  ## 耗时
  ~15 min (占位符)
