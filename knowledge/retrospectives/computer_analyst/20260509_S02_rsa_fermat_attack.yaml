topic: "技能卡: RSA Fermat 分解 + textbook RSA 解密"
content: |
  ## 技能名
  rsa_fermat_attack
  
  ## 何时用
  - 看到 .enc + public.txt (N, e) 同目录
  - N 是 1024-bit 或更小
  - 怀疑 p,q 生成时距离过近
  
  ## 完整脚本
  ```python
  import math
  
  def fermat_factor(N, max_steps=2_000_000):
      x = math.isqrt(N)
      if x * x < N: x += 1
      for i in range(max_steps):
          y2 = x*x - N; y = math.isqrt(y2)
          if y*y == y2: return x-y, x+y
          x += 1
      return None
  
  # 使用
  N = int(open("public.txt").readline().strip())
  e = 65537
  p, q = fermat_factor(N)
  d = pow(e, -1, (p-1)*(q-1))
  
  # Textbook RSA 解密 (128B block → 120B plain)
  data = open("file.enc", "rb").read()
  out = bytearray()
  for i in range(len(data)//128):
      c = int.from_bytes(data[i*128:(i+1)*128], 'big')
      m = pow(c, d, N)
      out += m.to_bytes(120, 'big')
  open("decrypted", "wb").write(out)
  ```
  
  ## 适用范围
  - |p-q| 很小的弱密钥
  - 1024-bit 以下 N
  - Textbook RSA (无 padding)
  
  ## 不适用
  - N > 2048 bit
  - PKCS#1 OAEP padding
  - 安全随机生成的 p,q
  
  ## 本题实战
  q-p = 240, 0 步命中 — 出题人故意放水
