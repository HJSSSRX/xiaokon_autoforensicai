topic: "钓鱼邮件发件人 — Deepin Wine Foxmail 路径"
content: |
  ## 实际步骤
  1. 发现 Foxmail 在 Deepin 上跑在 Wine 环境
  2. 路径: ~/.deepinwine/Foxmail/ (不是标准 Linux 邮件路径)
  3. 找到邮件数据库，sqlite3 查询 sender
  4. 发件人: hf13338261292@outlook.com
  5. 邮件主题: "Token 限时免费领" (钓鱼诱饵)
  
  ## 失败尝试
  - 先搜 ~/.thunderbird/ — 空，Thunderbird 未配置账户
  - 搜 ~/.config/evolution/ — 不存在
  - 搜 /var/mail/ — 空
  - 最后在 ~/.deepinwine/ 下找到 Foxmail 数据
  
  ## 工具坑
  - Deepin Wine 应用的路径不是标准 Linux FHS
  - Foxmail 邮件存储格式是专有 .dat + .box，不是标准 mbox/maildir
  - 需要 Foxmail 专用解析工具或直接 sqlite3 查索引
  
  ## 耗时
  ~20 min (大量时间浪费在错误路径搜索)
