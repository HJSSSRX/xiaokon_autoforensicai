topic: "工具坑: WSL PowerShell 中文路径 quoting 雷"
content: |
  ## 现象
  在 PowerShell 中通过 wsl -- bash -c "..." 传递含中文路径的命令时，
  引号嵌套极易出错，报 syntax error / unexpected EOF。
  
  ## 错误示例
  ```powershell
  # ❌ 这个会炸
  wsl -- bash -c "for p in /dev/loop*p*; do echo \"$p\"; done"
  ```
  
  ## 正确做法
  把命令写入 .sh 文件，再通过 wsl -- bash 执行:
  ```powershell
  # ✅ 稳定可靠
  @"
  #!/bin/bash
  for p in /dev/loop*p*; do
    echo "$p"
  done
  "@ | Set-Content .tmp_script.sh -Encoding ASCII
  wsl -- bash /mnt/f/cloud/DD/.tmp_script.sh
  ```
  
  ## 影响
  比赛期间至少浪费 15min 在 quoting 调试上
  
  ## 教训
  - 永远不要通过 PS → wsl 传复杂 bash 命令
  - 写 .sh 文件 → wsl 执行，零 quoting 问题
  - 临时脚本放 /mnt/f/cloud/DD/ 或 /tmp/
