qid: C7
topic: "AI apiKey — UOS AI 数据库未定位 (答'不存在'必错)"
content: |
  ## 我们答的
  "不存在"
  
  ## 官方
  UOS AI 的 sqlite db 中有真实 apiKey (sk- 开头)
  
  ## 卡在哪步
  1. 不知道 Deepin 23.1 自带 UOS AI (以为是第三方客户端)
  2. 只在 ~/.config/CherryStudio/、~/.config/ChatBox/ 等第三方路径搜索
  3. 搜不到就下结论"不存在"
  
  ## 当时假设
  AI 软件一定是独立安装的第三方客户端，配置在 ~/.config/<app_name>/
  
  ## 现在回看
  - Deepin 23.1 自带 UOS AI，是系统组件不是第三方应用
  - 配置在 ~/.config/deepin/ 或 ~/.local/share/deepin/ 下
  - apiKey 存储在 sqlite db 中，不是明文配置文件
  - "不存在" 在 CTF 比赛中几乎永远是错误答案
  
  ## 正确做法
  ```bash
  # 穷举所有 sqlite db
  for db in $(find ~/ -name "*.db" 2>/dev/null); do
    echo "=== $db ==="
    sqlite3 "$db" ".tables" 2>/dev/null
  done
  # 找到含 apiKey 的表
  sqlite3 <db> "SELECT key, value FROM config WHERE key LIKE '%api%' OR key LIKE '%key%'"
  ```
  
  ## 本质差异
  没找到 ≠ 不存在。系统自带 AI 的配置路径与第三方应用不同。
  
  ## 耗时
  ~30 min (放弃太早)
tags: [incorrect_answer, not_found, api_key, uos_ai, sqlite]
