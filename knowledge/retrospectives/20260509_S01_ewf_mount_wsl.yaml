topic: "技能卡: EWF镜像在WSL下挂载完整链"
content: |
  ## 技能名
  ewf_mount_wsl
  
  ## 何时用
  在 Windows + WSL 环境下挂载 E01 取证镜像
  
  ## 完整脚本
  ```bash
  # 1. 安装依赖
  sudo apt install ewf-tools sleuthkit -y
  
  # 2. 挂载 EWF
  sudo mkdir -p /mnt/e01
  sudo ewfmount /mnt/d/2026FIC/检材.E01 /mnt/e01
  # → 产生 /mnt/e01/ewf1 (raw 虚拟设备)
  
  # 3. 分区映射
  sudo losetup -f --show -P --read-only /mnt/e01/ewf1
  # → /dev/loop0, 分区自动为 /dev/loop0p1..pN
  
  # 4. 查看分区表
  sudo mmls /mnt/e01/ewf1
  
  # 5. 挂载文件系统 (只读+跳过journal)
  sudo mkdir -p /mnt/pc_root /mnt/pc_data
  sudo mount -o ro,noload /dev/loop0p3 /mnt/pc_root
  sudo mount -o ro,noload /dev/loop0p5 /mnt/pc_data
  
  # 6. 卸载
  sudo umount /mnt/pc_root /mnt/pc_data
  sudo losetup -d /dev/loop0
  sudo umount /mnt/e01
  ```
  
  ## 适用范围
  - E01/EWF 格式镜像
  - ext4/xfs 文件系统
  - WSL2 (kernel 5.15+)
  
  ## 不适用
  - btrfs/ZFS (WSL 内核可能缺模块)
  - LVM (需要 lvm2 包)
  - 加密分区 (LUKS/BitLocker)
  
  ## 关键坑
  - mount 必须加 ro,noload 避免 ext4 journal replay
  - WSL 下 PowerShell 传中文路径易触发 quoting 雷 → 放 .sh 文件执行
  - losetup -P 需要较新内核
