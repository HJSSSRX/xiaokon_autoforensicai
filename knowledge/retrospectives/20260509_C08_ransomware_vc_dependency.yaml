topic: "勒索联系方式 — VC容器依赖 (未攻破)"
content: |
  ## 我们答的
  占位符
  
  ## 卡在哪步
  VeraCrypt 容器完全未攻破。虽然找到了:
  - tool/VeraCrypt-1.26.24-x86_64.AppImage
  - ~/.config/VeraCrypt/Configuration.xml
  但没有密码，无法挂载容器。
  
  ## 当时假设
  勒索信应该在 Desktop/Downloads/Documents 明文位置
  
  ## 现在回看
  - 勒索信在 VC 加密容器内
  - 必须先攻破 VC 容器才能看到
  - VC 密码在 mobile 检材的小米便签中 (9ed2@99y8.com.cn)
  - 容器内还有 Go 程序需要逆向 (IDA 9.x + main_main + 小端序 hex → UTF-8)
  
  ## 正确做法
  1. 火眼提示 "VC 加密" → 立即去 mobile/server 检材找密码
  2. mobile 笔记字符串 (含特殊字符) 优先级最高
  3. 挂载后: find /mnt/vc -type f → 勒索信 + Go 程序
  
  ## 本质差异
  跨检材联动失败。PC 检材只有 VC 容器文件，密码在 mobile 检材。
  
  ## 耗时
  ~20 min (占位符，零产出)
