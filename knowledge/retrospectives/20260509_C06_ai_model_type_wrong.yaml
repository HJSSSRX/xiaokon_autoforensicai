topic: "AI模型类型 — 题意误读 (model_id vs provider)"
content: |
  ## 我们答的
  minimax/minimax-m2.5:free (具体 model_id)
  
  ## 官方要的
  OpenRouter (provider/平台名)
  
  ## 卡在哪步
  我们在浏览器历史找到了 openrouter.ai/minimax/minimax-m2.5:free 的访问记录，
  就把 model_id 当"类型"提交了。
  
  ## 当时假设
  "类型" = 模型的具体型号名称。我们以为题目问的是"用哪个模型"。
  
  ## 现在回看
  中文"类型"在 CTF 语境下通常指 provider/category，不是具体型号。
  类似问"你用什么手机" → 答"iPhone" (品牌) 不是 "iPhone 16 Pro Max" (型号)。
  
  ## 正确做法
  1. 浏览器历史搜 openrouter → 确认使用 OpenRouter 平台
  2. UOS AI 通过 OpenRouter 调用多种模型 (minimax 只是其中之一)
  3. 答案应该是 provider 名: OpenRouter
  
  ## 本质差异
  题意误读: "类型" = provider/category，不是 model_id
  
  ## 耗时
  ~45 min (方向全错，在 CherryStudio/ChatBox/LobeChat 清单上浪费搜索)
