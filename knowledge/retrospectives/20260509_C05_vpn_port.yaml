topic: "VPN代理端口 — Clash Verge 配置"
content: |
  ## 实际步骤
  1. find ~/.config -name '*.yaml' | xargs grep -l 'port'
  2. 定位 ~/.config/clash-verge/verge.yaml
  3. grep 'mixed-port' → 9527
  
  ## 失败尝试
  - 先搜 /etc/ 下代理配置 — 无
  - 搜 ~/.config/v2ray/ — 不存在
  - 搜 ~/.config/shadowsocks/ — 不存在
  
  ## 工具坑
  - Clash Verge 新版用 mixed-port 替代分离的 socks-port + port
  - 配置在 ~/.config/clash-verge/ 不是 ~/.config/clash/
  
  ## 耗时
  ~10 min
