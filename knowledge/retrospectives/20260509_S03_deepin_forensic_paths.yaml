topic: "技能卡: Deepin 23.1 取证路径速查"
content: |
  ## 技能名
  deepin_23_forensic_paths
  
  ## 何时用
  遇到 Deepin 23.1 检材时快速定位关键数据
  
  ## 磁盘布局
  - p1: Boot (ext4, 1.5GB) → /boot
  - p3: Roota (ext4, 55GB) → rootfs (不可变系统)
  - p5: _dde_data (ext4, 16GB) → 用户数据 ★
  
  ## 关键路径 (user=lha)
  | 数据 | 路径 |
  |---|---|
  | 用户家目录 | /mnt/pc_data/home/lha/ |
  | Wine 应用 | ~/.deepinwine/ |
  | Chrome | ~/.config/google-chrome/ |
  | Deepin 浏览器 | ~/.config/browser/ |
  | Foxmail (Wine) | ~/.deepinwine/Foxmail/ |
  | 搜狗输入法 | ~/.config/SogouPY/, ~/.config/cpis/ |
  | UOS AI | ~/.config/deepin/, ~/.local/share/deepin/ |
  | Clash Verge | ~/.config/clash-verge/ |
  | VeraCrypt | ~/.config/VeraCrypt/ |
  | 便签 | ~/.local/share/deepin/deepin-voice-note/ |
  | 向日葵 | ~/Sunlogin Files/ |
  
  ## 快速侦查
  ```bash
  find /mnt/pc_data/home/lha -name "*.db" -o -name "*.sqlite" 2>/dev/null
  find /mnt/pc_data/home/lha -name "*.enc" -o -name "*.hc" 2>/dev/null
  find /mnt/pc_data/home/lha/.config -name "*.json" -o -name "*.yaml" 2>/dev/null
  ```
  
  ## 关键教训
  - rootfs 上 /home 是空骨架, 真实数据在 p5 _dde_data
  - Foxmail 跑在 Wine 里, 不是标准 Linux 邮件路径
  - UOS AI 是系统组件, 不是第三方应用
