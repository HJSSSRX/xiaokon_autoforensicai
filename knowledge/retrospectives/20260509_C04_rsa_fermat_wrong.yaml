topic: "APK下载链接 — RSA Fermat 弱密钥 (错答→复盘解出)"
content: |
  ## 我们答的
  https://dl.sp-live88.com/update/latest.apk (平台不认)
  
  ## 错因
  完全没尝试解密 Downloads/ 下的 .enc 文件。看到加密文件没有条件反射去同目录找解密器。
  
  ## 当时假设
  "推广设计图" 的 apk 链接应该在 APP 内 (mobile 反编译 HotClub APK 拿到的 update_url)
  
  ## 正确路径 (复盘)
  1. Downloads/ 三件套:
     - 推广设计图.png.enc (376KB)
     - 加密图片查看.html (前端 RSA 解密器)
     - public.txt (N + e=65537)
  2. Fermat 分解 N (q-p=240, 0步命中!)
  3. 拿 d, 解密 .enc (textbook RSA: 128B block → 120B plain)
  4. 得 PNG → OCR 提取 apk URL
  
  ## 关键命令
  ```python
  import math
  N = int(open("public.txt").readline())
  x = math.isqrt(N) + 1
  while True:
      y2 = x*x - N; y = math.isqrt(y2)
      if y*y == y2: p, q = x-y, x+y; break
      x += 1
  d = pow(65537, -1, (p-1)*(q-1))
  ```
  
  ## 本质差异
  题意误读: "推广设计图" = 加密的 PNG 文件，不是 APP 内 URL
  
  ## 耗时
  比赛时 30min (错答) + 复盘 15min (解出)
