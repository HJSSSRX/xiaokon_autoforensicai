# FIC2026 M02 — Travel Plan Date from Todo App
# Migrated from: cases/2026FIC电子取证/wp_batches/PHONE_M01-M05.md

meta:
  competition: "FIC2026"
  competition_id: "2026fic"
  question_id: "M02"
  question_text: "分析手机检材，李安弘手机计划前往迪拜的日期是"
  category_l1: "mobile_android"
  category_l2: "app_data_extraction"
  tags:
    - "sqlite"
    - "miui_notes"
    - "todo"
    - "date_extraction"
    - "travel_plan"
  points: 10
  difficulty: "easy"

answer:
  value: "2026.06.06"
  value_type: "date"
  confidence: "high"
  verified: false
  verified_method: "unverified"
  verified_date: null

walkthrough:
  summary: "从小米便签 todo.db 数据库中检索包含'迪拜/dubai'关键词的待办事项"
  steps:
    - seq: 1
      description: "Locate MIUI Notes/Todo database"
      command: "find {phone_extract}/data/user/0/com.miui.notes/databases/ -name '*.db'"
      tool: "find"
      expected_output: "todo.db, notes.db, etc."
      human_note: "小米便签有 notes.db (笔记) 和 todo.db (待办) 两个数据库"

    - seq: 2
      description: "Query todo table for travel-related entries"
      command: "sqlite3 {phone_extract}/data/user/0/com.miui.notes/databases/todo.db \"SELECT id,content,plain_text,datetime(create_time/1000,'unixepoch','+8 hours') FROM todo\""
      tool: "sqlite3"
      expected_output: "Row containing '2026.06.06 乘坐飞机去 dubai'"
      human_note: "Timestamps stored as Unix millis, convert to CST (+8h)"

    - seq: 3
      description: "Verify with keyword search"
      command: "sqlite3 {phone_extract}/data/user/0/com.miui.notes/databases/todo.db \"SELECT plain_text FROM todo WHERE plain_text LIKE '%dubai%'\""
      tool: "sqlite3"
      expected_output: "2026.06.06 乘坐飞机去 dubai"
      human_note: "直接搜索关键词，快速定位"

  evidence_path: "手机检材.tar → data/user/0/com.miui.notes/databases/todo.db"

tools_used:
  - name: "sqlite3"
    version: "3.x"
    platform: "both"
    install_script: "install/01_install_wsl_tools.sh"
    install_path: "/usr/bin/sqlite3"
    alternative: "DB Browser for SQLite (GUI)"
  - name: "find"
    version: "any"
    platform: "linux"
    install_script: null
    install_path: "/usr/bin/find"
    alternative: null

