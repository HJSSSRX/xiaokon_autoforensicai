      correction: "同时搜索中英文关键词：LIKE '%迪拜%' OR LIKE '%dubai%'"
    - mistake: "忘记时区转换，输出 UTC 时间"
      correction: "中国比赛的时间一律转换为 CST (UTC+8)"
