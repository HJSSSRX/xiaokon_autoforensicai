  guided_prompts:
    - prompt: "题目问'计划前往迪拜的日期'。这类信息可能记录在手机的哪个应用中？"
      hints:
        - "日历、备忘录、待办事项是常见记录位置"
        - "小米手机用 com.miui.notes 存储便签和待办"
      answer_keywords: ["便签", "待办", "notes", "todo"]
    - prompt: "你找到了 todo.db。用 sqlite3 查询包含 'dubai' 或 '迪拜' 的记录"
      hints:
        - "SQL: SELECT * FROM todo WHERE plain_text LIKE '%dubai%'"
      answer_keywords: ["2026.06.06", "dubai"]
    - prompt: "记录中的时间戳是什么格式？如何转换为人类可读时间？"
      hints:
        - "毫秒级 Unix 时间戳，需要除以 1000 再加时区偏移"
        - "sqlite3 函数: datetime(ts/1000,'unixepoch','+8 hours')"
      answer_keywords: ["unixepoch", "1000", "+8"]
  common_mistakes:
