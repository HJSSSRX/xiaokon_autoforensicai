walkthrough:
  summary: "在 Clash Verge 配置文件中找到 mixed-port 设置"
  steps:
    - seq: 1
      description: "Locate VPN/proxy software config directories"
      command: "find {mount}/root/.config -name '*.yaml' -path '*clash*'"
      tool: "find"
      expected_output: "Path to clash-verge/verge.yaml or similar"
      human_note: "Common VPN tools on Linux: Clash, V2Ray, Shadowsocks. Check .config/ directory"

    - seq: 2
      description: "Read the Clash configuration for port settings"
      command: "grep -i 'port' {mount}/root/.config/clash-verge/verge.yaml"
      tool: "grep"
      expected_output: "mixed-port: 7897"
      human_note: "Clash uses mixed-port for both SOCKS5 and HTTP proxy"

    - seq: 3
      description: "Verify no other proxy configs override this"
      command: "grep -rh 'port' {mount}/root/.config/clash*/ | sort -u"
      tool: "grep"
      expected_output: "Consistent port across config files"
      human_note: "Check for overrides in profiles or runtime configs"

  evidence_path: "PC.E01 → [root]/root/.config/clash-verge/verge.yaml"

