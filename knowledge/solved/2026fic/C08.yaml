  score_rate_impact: "依赖 VC 容器解密, 容器未攻破则无法作答"

question:
  raw: "勒索软件解密服务联系方式为？"
  format_hint: "字母+数字组合, 如 abcd123232"

answer:
  value: "VC 容器内 Go 程序逆向所得"
  format_note: "可能是 Telegram 用户名 / Tox ID / 邮箱"

walkthrough:
  identify: |
    勒索线索可能位置:
    1. 浏览器历史 (Telegram bot / onion)
    2. 邮件 (Thunderbird / Foxmail)
    3. 桌面截图/壁纸
    4. VC 加密容器内 (最可能)
  extract: |
    # 浏览器历史
    sqlite3 ~/.config/google-chrome/Default/History \
      "SELECT url FROM urls WHERE url LIKE '%t.me%' OR url LIKE '%onion%'"
    # 邮件
    find ~/.thunderbird ~/.deepinwine -name "*.eml" -o -name "*.msf"
    # 勒索信关键词
    grep -rli "decrypt\|解密\|ransom\|勒索\|bitcoin" ~/Desktop ~/Documents ~/Downloads
  analyze: "答案在 VC 容器内, 需先攻破 VeraCrypt 容器"
  verify: "官方 wp 确认答案在 VC 容器内 Go 程序逆向"

failure_analysis:
  what_we_answered: "占位符"
  why_wrong: "VC 容器未攻破, 无法访问容器内勒索信"
  root_cause: |
    1. 没从 mobile 检材获取 VC 密码
    2. 跨检材联动意识不足
  lesson: |
    1. 火眼提示 'VC 加密' → 立即去其他检材找密码
    2. mobile 笔记字符串 (含特殊字符) 优先级最高
    3. 容器内 Go 程序逆向: IDA 9.x + main_main + 小端序 hex → UTF-8

integrity:
  source: "VC 加密容器内"
  external_access: false
  tools: ["veracrypt", "sqlite3", "ida/ghidra"]
  artifacts: []
  cross_evidence_dependency: "mobile 检材笔记中的 VC 密码"
