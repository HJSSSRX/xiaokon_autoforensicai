walkthrough:
  summary: "从 Android build fingerprint 文件识别设备代号 violet → Redmi Note 7 Pro"
  steps:
    - seq: 1
      description: "Locate build fingerprint in Android data backup"
      command: "cat {phone_extract}/data/misc/recovery/ro.build.fingerprint"
      tool: "cat"
      expected_output: "xiaomi/violet/violet:10/QKQ1.190915.002/..."
      human_note: "Build fingerprint format: brand/codename/device:version/build/..."

    - seq: 2
      description: "Identify codename and map to marketing name"
      command: null
      tool: null
      expected_output: "codename 'violet' = Redmi Note 7 Pro (public knowledge)"
      human_note: "查 xiaomi codename 列表。violet = Redmi Note 7 Pro, lavender = Redmi Note 7"

    - seq: 3
      description: "Cross-validate with system user XML"
      command: "grep lastLoggedInFingerprint {phone_extract}/data/system/users/0.xml"
      tool: "grep"
      expected_output: "Same fingerprint string containing 'violet'"
      human_note: "Multiple sources should all point to the same device"

    - seq: 4
      description: "Cross-validate with Xiaomi account data"
      command: "grep -rh fingerprint {phone_extract}/data/user/0/com.xiaomi.account/ | grep violet"
      tool: "grep"
      expected_output: "build_fingerprint containing 'violet'"
      human_note: "Three independent sources confirming same device"

  evidence_path: "手机检材.tar → data/misc/recovery/ro.build.fingerprint"

