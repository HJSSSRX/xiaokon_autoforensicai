question:
  raw: "存放黄金的保险柜编号为？"
  format_hint: "数字或字母+数字组合"

answer:
  value: "VC 容器内的卷标/文件夹名"
  format_note: "保险柜 ≠ VeraCrypt 容器, 保险柜是物理概念"

walkthrough:
  identify: |
    VeraCrypt 容器解密后:
    - 卷标/文件夹名可能是保险柜编号
    - 或容器内 README/notes 文件含编号
  extract: |
    veracrypt --mount <container> --password="<from_mobile>" --mount-point=/mnt/vc
    ls /mnt/vc/
    cat /mnt/vc/README* /mnt/vc/*.txt
  analyze: "保险柜是物理存放黄金的柜子, 编号在 VC 容器解密后的文件中"
  verify: "官方 wp 确认"

failure_analysis:
  what_we_answered: "占位符"
  why_wrong: "VC 容器未攻破"
  root_cause: "跨检材联动失败, 没从 mobile 拿到密码"
  lesson: |
    1. 保险柜 ≠ VeraCrypt 容器 (概念区分)
    2. VC 容器是加密存储, 保险柜是物理柜子
    3. 容器解密后看卷标/文件夹名/README

integrity:
  source: "VC 加密容器内"
  external_access: false
  tools: ["veracrypt"]
  artifacts: []
