  format_hint: "可能是数字或字母+数字组合"

answer:
  value: "VC 容器内文件内容"
  format_note: "保险柜密码 ≠ VC 容器密码, 是物理保险柜的密码"

walkthrough:
  identify: "VC 容器解密后, 保险柜密码在容器内文件中"
  extract: |
    veracrypt --mount <container> --password="<from_mobile>" --mount-point=/mnt/vc
    find /mnt/vc -type f -exec cat {} \;
  analyze: "保险柜密码是物理保险柜的密码, 与 VC 容器密码不同"
  verify: "官方 wp 确认"

