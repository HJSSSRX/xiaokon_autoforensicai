walkthrough:
  summary: "从 /etc/os-release 或 /etc/deepin-version 读取操作系统版本"
  steps:
    - seq: 1
      description: "Mount the disk image and locate OS identification files"
      command: "cat {mount}/etc/os-release"
      tool: "cat"
      expected_output: "PRETTY_NAME containing OS name and version"
      human_note: "For Deepin/UOS, also check /etc/deepin-version"

    - seq: 2
      description: "Cross-validate with deepin-specific version file"
      command: "cat {mount}/etc/deepin-version"
      tool: "cat"
      expected_output: "Version=20, Type=Professional"
      human_note: "UOS Desktop 20 Pro is based on Debian 10 (Buster)"

    - seq: 3
      description: "Additional validation from LSB release"
      command: "cat {mount}/etc/lsb-release"
      tool: "cat"
      expected_output: "DISTRIB_DESCRIPTION with UOS info"
      human_note: "Multiple sources should agree"

  evidence_path: "PC.E01 → [root]/etc/os-release, /etc/deepin-version"

