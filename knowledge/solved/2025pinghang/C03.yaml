question:
  raw: "分析起早王的计算机检材，起早王的计算机默认浏览器是什么（格式：Google）"
answer:
  value: "Microsoft Edge"
  format_note: "NTUSER.DAT UserChoice ProgId=MSEdgeHTM"
walkthrough:
  identify: "NTUSER.DAT\\Software\\Microsoft\\Windows\\Shell\\Associations\\UrlAssociations\\{http,https}\\UserChoice\\ProgId"
  extract: |
    python Registry.Registry('NTUSER.DAT')
    k.open(r'Software\Microsoft\Windows\Shell\Associations\UrlAssociations\https\UserChoice').value('ProgId')
  analyze: |
    https ProgId = MSEdgeHTM
    http  ProgId = MSEdgeHTM
    ProgId MSEdgeHTM → Microsoft Edge
    已安装浏览器：IE、Microsoft Edge、VMware browser（Tor 在桌面但非注册浏览器）
  verify: "SOFTWARE\\Clients\\StartMenuInternet 列出浏览器列表含 Microsoft Edge"
  command: "python3 cases/2025平航杯/artifacts/c_reg_basics.py"
integrity:
  source: "NTUSER.DAT + SOFTWARE hive"
  external_access: false
  tools: ["python-registry"]
  artifacts:
    - "cases/2025平航杯/artifacts/c_reg_basics.py"
