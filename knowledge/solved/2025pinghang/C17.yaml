meta:
  competition: "2025pinghang"
  question_id: "C17"
  category: "C_computer"
  short_name: "虚拟货币助记词第 8 个"
  difficulty: "hard"
  status: "solved"
  confidence: "high"
question:
  raw: "分析起早王的计算机检材，起早王的虚拟货币钱包的助记词的第 8 个是什么（格式：abandon）"
answer:
  value: "draft"
  format_note: "12 词 BIP39 助记词序列中第 8 个"
walkthrough:
  identify: |
    日记 2025-03-23 里起早王写道：
      '搞了个钱包，助记词老是要忘记掉怎么办，要不放在输入法里试试。'
    → 助记词存在输入法自定义短语中。
  extract: |
    微软拼音用户字典目录：
      C:\Users\起早王\AppData\Roaming\Microsoft\InputMethod\Chs\UDP*.tmp
    多个 268 字节的 UDP 文件内容相同（副本）：
      flash treat wide divide type plug
      garlic draft infant broom desert useful
  analyze: |
    12 词全部在 BIP39 词表内，组成合法 BIP39 助记词序列：
      1. flash
      2. treat
      3. wide
      4. divide
      5. type
      6. plug
      7. garlic
      8. draft  ← 第 8 个
      9. infant
      10. broom
      11. desert
      12. useful
  verify: |
    eth_account.Account.from_mnemonic(...) 不报 InvalidMnemonic 异常；
    checksum 验证通过；能成功派生地址（见 C18）。
  command: |
    strings -el /mnt/win_c/Users/起早王/AppData/Roaming/Microsoft/InputMethod/Chs/UDP*.tmp | sort -u
integrity:
  source: "微软拼音 IME UDP 字典文件 + 日记"
  external_access: false
  tools: ["strings", "grep"]
  artifacts:
    - "cases/2025平航杯/artifacts/c_ime2.sh"
    - "cases/2025平航杯/artifacts/c_wallet.py"
notes: |
  微软拼音的用户自定义短语以编码形式存于 UDP<hash>.tmp 内，
  但字符串明文可通过 UTF-16 LE strings 提取。
