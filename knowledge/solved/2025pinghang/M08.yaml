meta:
  competition: "2025pinghang"
  question_id: "M08"
  category: "M_phone"
  short_name: "木马 C2 IP+端口"
  difficulty: "hard"
  status: "unsolved"
  confidence: "low"
question:
  raw: "分析倩倩的手机检材，检材内的木马软件所关联到的 ip 和端口是什么（格式：127.0.0.1:1111）"
answer:
  value: "未解（推断 IP=192.168.180.107，端口需脱壳后确认）"
  format_note: "需动态脱壳梆梆加固后才能获得完整 IP:port"
walkthrough:
  identify: |
    木马 com.example.reverseshell2 使用梆梆加固 (libSecShell.so)。
    主 classes.dex 仅含 SecShell stub，业务代码加密保存在
    assets/classes0.jar 和 r/.cache/classes.jar 中。
    两文件均无 ZIP 头（前 16 字节随机），无法静态 unzip/反编译。
  extract: "尝试 strings 主 dex/native lib/encrypted jar 均无 IP 明文"
  analyze: |
    部分推断：木马下载源 192.168.180.107（M04）极可能就是 C2 服务器的 IP，
    因为手机和起早王主机在同一局域网。但端口未知，需脱壳。
  verify: "需要 frida-dexdump / BlackDex 在 Android 模拟器实时脱壳"
  command: |
    # 静态搜索均无果
    strings -a base.apk classes.dex assets/classes0.jar lib/*/*.so \
      | grep -E '([0-9]{1,3}\.){3}[0-9]{1,3}(:[0-9]+)?'
    # 待动态脱壳: frida + Bangcle unpacker
unresolved_reason: |
  梆梆加固 (Bangcle SecShell) 加密保护业务 dex。静态分析无法还原 Socket
  连接的 IP/port 字面量。需要在 ARM Android 模拟器（API ≥ 21）上运行
  并使用 frida-dexdump 或 BlackDex 实时 dump 解密后的 dex。
integrity:
  source: "fix2_sign.apk / com.example.reverseshell2 backup"
  external_access: false
  tools: ["jadx", "strings", "aapt"]
  artifacts:
    - "cases/2025平航杯/artifacts/m_native.sh"
