question:
  raw: "分析起早王的计算机检材，起早王计算机最后一次正常关机时间（格式：2020/1/1 01:01:01）"
answer:
  value: "2025/4/10 11:15:29"
  format_note: "SYSTEM hive ControlSet\\Control\\Windows\\ShutdownTime (FILETIME LE 8 bytes) → UTC+8"
walkthrough:
  identify: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Windows\\ShutdownTime"
  extract: |
    python Registry.Registry('SYSTEM')
    k.open(r'ControlSet001\Control\Windows').value('ShutdownTime').value()
    # 8-byte little-endian FILETIME（100ns since 1601）
    ft = struct.unpack('<Q', b)[0]
    dt_utc = datetime.utcfromtimestamp(ft/10_000_000 - 11644473600)
  analyze: |
    UTC:    2025-04-10 03:15:29.572
    UTC+8:  2025-04-10 11:15:29.572 → 题目要求本地时间
  verify: "E01 创建/最后修改时间 2025-04-10 与此时间吻合（acquisition 后关机）"
