meta:
  competition: "2025pinghang"
  question_id: "M06"
  category: "M_phone"
  short_name: "木马应用名"
  difficulty: "easy"
  status: "solved"
  confidence: "high"
question:
  raw: "分析倩倩的手机检材，检材内的木马 app 的应用名称是什么（格式：Baidu）"
answer:
  value: "Google Service Framework"
  format_note: "MIUI 备份文件名同名：Google Service Framework(com.example.reverseshell2).bak"
walkthrough:
  identify: "MIUI 备份命名规则：<应用显示名>(<包名>).bak"
  extract: "ZIP 内文件名：Google Service Framework(com.example.reverseshell2).bak"
  analyze: |
    AndroidManifest.xml 的 application:label → "Google Service Framework"
    伪装成 Google 系统服务（实际系统的 GSF 包名是 com.google.android.gsf）
  verify: |
    aapt dump badging fix2_sign.apk | grep application-label
  command: |
    aapt dump badging fix2_sign.apk 2>&1 | grep -E "application-label|package:"
integrity:
  source: "ZIP 列表 + base.apk AndroidManifest"
  external_access: false
  tools: ["unzip -l", "aapt"]
  artifacts: []
