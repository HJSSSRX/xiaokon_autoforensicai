meta:
  competition: "2025pinghang"
  question_id: "C06"
  category: "C_computer"
  short_name: "开始写日记时间"
  difficulty: "medium"
  status: "solved"
  confidence: "high"
question:
  raw: "分析起早王的计算机检材，起早王开始写日记的时间（格式：2020/1/1）"
answer:
  value: "2025/3/3"
  format_note: "RedNotebook 第一篇日记『3月3日 阴 今天考虑开始写日记…』"
walkthrough:
  identify: |
    用户 C 桌面没有日记文件，但 Sandboxie 沙箱下有：
    C:\Sandbox\起早王\diary\user\current\.rednotebook\data\
      2025-02.txt  (3 字节，内容 '{}'，即空月)
      2025-03.txt  (6600 字节)
  extract: "cat 2025-02.txt && cat 2025-03.txt"
  analyze: |
    2025-02.txt 内容 = `{}` 空 JSON，该月没写日记。
    2025-03.txt 第一条 key=3（3 日），text 开头：
      '3月3日 阴
      今天考虑开始写日记，放在这里应该没人发现吧…'
    → 开始写日记时间 = 2025年3月3日
  verify: "RedNotebook YAML 文件按天存 key；2025-02 key 为空 = 2 月无；3 月最早 key=3"
  command: "cat /mnt/win_c/Sandbox/起早王/diary/user/current/.rednotebook/data/2025-03.txt | head"
integrity:
  source: "Sandbox RedNotebook data 目录"
  external_access: false
  tools: ["cat"]
  artifacts:
    - "cases/2025平航杯/artifacts/c_sandbox.sh"
notes: |
  RedNotebook 开源日记软件，默认路径 ~/.rednotebook/data/YYYY-MM.txt；
  起早王把它装在 Sandboxie 沙箱中隔离（Recent lnk 未出现，安全意识强）。
