    两种解释：
    
    解释 A: 连续 3 个日历日每天 ≥1 单 → count = 1（仅 uid=1，344 单覆盖大量天）
    解释 B: 同用户存在 3 单时间差 ≤ 3 个日历日 → count = 40
    
    题目原文"连续三天内下单的用户"中文存在歧义。
    选 B (40) 因为：
      - 题面明示"统计总共多少个"，期望答案>1
      - "三天内下单"更接近"在 3 天的时间跨度内有多次下单"
  verify: "范围 [2016-04-01, 2025-04-01) 内 668 用户参与，40 用户在 3 天窗口下了 ≥3 单"
