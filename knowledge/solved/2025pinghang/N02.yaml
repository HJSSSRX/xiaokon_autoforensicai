# 2025 平航杯 N02 — 伪装设备的原始名称
meta:
  competition: "2025 平航杯"
  competition_id: "2025pinghang"
  question_id: "N02"
  question_text: "起早王有一个用于伪装成倩倩耳机的蓝牙设备，该设备的原始设备名称为什么（格式：XXX_xxx）"
  category_l1: "network_traffic"
  category_l2: "bluetooth_le"
  tags: ["ble_adv", "device_name", "flipper_zero", "spoofing"]
  points: 10
  difficulty: "easy"

answer:
  value: "Flipper 123all"
  value_type: "text"
  confidence: "high"
  verified: true
  verified_method: "time_ordered_adv_name_diff"
  verified_date: "2026-05-04"

walkthrough:
  summary: "Flipper Zero (MAC 80:e1:26:33:32:31) 原始广告名为 Flipper 123all；后修改第三字节与名字伪装成 QQ_WF_SP8OON"
  steps:
    - seq: 1
      description: "Dump all adv device names with timestamps and MACs"
      command: |
        tshark -r BLE -Y 'btcommon.eir_ad.entry.device_name' \
          -T fields -e frame.time_epoch -e btle.advertising_address \
          -e btcommon.eir_ad.entry.device_name > /tmp/ble_names.tsv
      tool: "tshark"
      expected_output: "~1900 valid rows, mostly duplicate samples due to 3-channel BLE"
      human_note: null

    - seq: 2
      description: "Find paired MACs differing by one byte (Flipper rotation pattern)"
      command: "awk ... | sort -u"
      tool: "awk"
      expected_output: "80:e1:26:33:32:31 → Flipper 123all;  80:e1:26:35:32:31 → QQ_WF_SP8OON"
      human_note: "Flipper Zero 的 BLE 伪装通常只改 MAC 的部分字节，OUI 保持不变"

    - seq: 3
      description: "Compare earliest timestamps for the two MACs"
      command: "grep '80:e1:26:33:32:31' /tmp/ble_names.tsv | sort -k1n | head -1"
      tool: "grep+sort"
      expected_output: "1744165654.337 (原始) < 1744165886.710 (伪装)"
      human_note: "早出现的是原始名"

  evidence_path: "BLE pcapng → ADV_IND packets → AD type 0x09 (Complete Local Name)"

tools_used:
  - name: "tshark"
    version: "3.6.2"
    platform: "linux"
    install_script: "apt install -y tshark"
    install_path: "/usr/bin/tshark"

