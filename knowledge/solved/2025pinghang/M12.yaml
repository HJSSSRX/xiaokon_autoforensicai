question:
  raw: "分析倩倩的手机检材，根据倩倩的身份证号请问倩倩来自哪里（格式：北京市西城区）"
answer:
  value: "上海市徐汇区"
  format_note: "身份证号 310104200108110624（前6位 310104 = 上海市徐汇区行政区划码）"
walkthrough:
  identify: |
    解 com.baidu.input_mi (百度输入法) 备份的 sp 配置后，
    在 com.baidu.input_mi_preferences.xml 中找到：
      <string name="key_front_clip_content">310104200108110624</string>
    这是百度输入法记录的剪贴板上一条内容。
  extract: |
    18 位身份证号 310104200108110624：
    - 前 6 位 310104 = 上海市徐汇区
    - 中 8 位 20010811 = 出生 2001-08-11
    - 后 4 位 0624 = 顺序码 + 校验码
  analyze: |
    校验位计算（GB 11643-1999）：
      权重 [7,9,10,5,8,4,2,1,6,3,7,9,10,5,8,4,2]
      和 = 173, 173 mod 11 = 8, 校验表[8] = '4' ✓
  verify: |
    剪贴板内容 + 番茄/豆包等 sp 中也存在相同的 18 位串
    可与微信支付/Mi Pay 实名互证。
  command: |
    grep -F '310104200108110624' \
      /tmp/phone/all_bak/com.baidu.input_mi/.../com.baidu.input_mi_preferences.xml
integrity:
  source: "com.baidu.input_mi backup → sp/com.baidu.input_mi_preferences.xml"
  external_access: false
  tools: ["unzip", "grep"]
  artifacts:
    - "cases/2025平航杯/artifacts/m_search_id.sh"
notes: |
  剪贴板被输入法明文记录是常见隐私泄露点，警方取证经典源。
