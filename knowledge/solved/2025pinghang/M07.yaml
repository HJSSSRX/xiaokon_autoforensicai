meta:
  competition: "2025pinghang"
  question_id: "M07"
  category: "M_phone"
  short_name: "木马加固类型"
  difficulty: "medium"
  status: "solved"
  confidence: "high"
question:
  raw: "分析倩倩的手机检材，检材内的木马 app 的使用什么加固（格式：腾讯乐固）"
answer:
  value: "梆梆加固"
  format_note: "Bangcle SecShell"
walkthrough:
  identify: "解 base.apk 后查看 lib/ 和 META-INF/"
  extract: |
    lib/armeabi-v7a/libSecShell.so
    lib/armeabi-v7a/libSecShell-x86.so
    classes.dex 中含 com.SecShell.SecShell.* 类（壳 stub）
    assets/classes0.jar 加密保存原始 dex（无 ZIP 头）
  analyze: |
    libSecShell + com.SecShell.SecShell 命名空间是梆梆加固 (Bangcle) 的特征。
    与腾讯乐固 (com.tencent.StubShell)、爱加密 (com.shell.NativeApplication)
    等其他加固方案的命名特征明显不同。
  verify: "strings classes.dex | grep -i SecShell"
  command: |
    unzip -p base.apk classes.dex | strings | grep -E "SecShell|Bangcle"
    ls lib/*/lib*.so
integrity:
  source: "fix2_sign.apk / base.apk"
  external_access: false
  tools: ["unzip", "strings"]
  artifacts: []
