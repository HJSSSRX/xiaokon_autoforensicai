  steps:
    - seq: 1
      description: "From N07 decoded output, take last non-empty command"
      command: null
      expected_output: "rundll32 url.dll,FileProtocolHandler https://fakeupdate.net/win10ue/bsod.html"
      human_note: "rundll32.exe url.dll,FileProtocolHandler <URI> 等同于用默认 handler 打开 URI，此处是打开浏览器跳假蓝屏页"
    - seq: 2
      description: "CapsLock correct decoding"
      command: null
      expected_output: "<CAPS>f<CAPS>ile<CAPS>p<CAPS>rotocol<CAPS>h<CAPS>andler → FileProtocolHandler"
      human_note: "每次切 CAPS on → 下一字母大写 → 切 OFF → 后续字母小写"
    - seq: 3
      description: "Compute md5"
      command: "python3 -c \"import hashlib;print(hashlib.md5(b'rundll32 url.dll,FileProtocolHandler https://fakeupdate.net/win10ue/bsod.html').hexdigest())\""
      tool: "python3"
      expected_output: "0566c1d6dd49db699d422db31fd1be8f"
