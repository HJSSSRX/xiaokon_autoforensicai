education:
  prerequisites:
    - "USB HID Boot Keyboard 协议"
    - "HID Usage Page 0x07 (Keyboard/Keypad)"
    - "CapsLock 状态机 vs Shift 叠加"
  learning_objectives:
    - "识别 USB device tree 中的 HID 键盘"
    - "解码非标准报告长度（37 字节 vs 典型 8 字节）"
    - "理解 Flipper Zero BLE-HoG 注入可在 USBPcap 中以 BT dongle 上游设备形式呈现"
  common_mistakes:
    - mistake: "把 'cmd'（Run 对话框输入）算作 cmd 内命令"
      correction: "cmd 是启动命令窗口，不是窗口内执行的命令"
    - mistake: "HID 默认报告 8 字节 → 查不到数据"
      correction: "实际长度因设备而异，先用 usb.data_len 探测"
    - mistake: "忽略 CapsLock 切换，把 'abcdefghijkimn' 当密码"
      correction: "正确解码为 'abcdefghijkImn'（第 12 位大写 I）"
