# 2025 平航杯 N07 — cmd 命令条数
meta:
  competition: "2025 平航杯"
  competition_id: "2025pinghang"
  question_id: "N07"
  question_text: "起早王对倩倩的电脑执行了几条 cmd 里的命令（格式：1）"
  category_l1: "network_traffic"
  category_l2: "usb_hid"
  tags: ["usb_hid", "keyboard_decoding", "badusb", "count"]
  points: 10
  difficulty: "medium"

answer:
  value: "7"
  value_type: "integer"
  confidence: "high"
  verified: true
  verified_method: "manual_count_after_hid_decode"
  verified_date: "2026-05-04"

walkthrough:
  summary: "USBPcap 2.4.1 → host 的 37 字节 HID 报告解码成击键序列，聊天结尾 'cmd' 打开 Run 对话框，随后在 cmd 窗口输入 7 条命令"
  steps:
    - seq: 1
      description: "Identify keyboard device"
      command: |
        tshark -r USBPcap -Y 'usb.bInterfaceClass==0x03' \
          -T fields -e usb.src -e usb.bInterfaceSubClass -e usb.bInterfaceProtocol
      tool: "tshark"
      expected_output: "2.4.0 subclass=0x01 protocol=0x01 → Boot Keyboard"
    - seq: 2
      description: "Extract HID reports (37 bytes incl. report ID + 1 modifier + 1 reserved + 6 keys + padding)"
      command: |
        tshark -r USBPcap -Y 'usb.src=="2.4.1" && usb.data_len==37' \
          -T fields -e frame.time_epoch -e usbhid.data > /tmp/kbd.tsv
      tool: "tshark"
      expected_output: "1295 rows"
    - seq: 3
      description: "Decode with CapsLock state machine"
      command: "python3 decode_hid.py"
      tool: "python3"
      expected_output: |
        [0] 聊天 + cmd
        [1] whoami
        [2] net user
        [3] net user qianqianwoaini$ abcdefghijkImn /add
        [4] net localgroup administrators qianqianwoaini$ /add
        [5] net user qianqianwoaini$ /del
        [6] net localgroup administrators qianqianwoaini$ /add
        [7] rundll32 url.dll,FileProtocolHandler https://fakeupdate.net/win10ue/bsod.html
      human_note: "CapsLock 键 0x39 需要状态切换，不能当成字符输出"
  evidence_path: "USBPcap → device 2.4 (ITE 048d:c102 Lenovo builtin keyboard) → endpoint 1 IN"

tools_used:
  - name: "tshark"
    version: "3.6.2"
    install_script: "apt install tshark"
  - name: "python3"
    version: "3.10+"

ai_meta:
