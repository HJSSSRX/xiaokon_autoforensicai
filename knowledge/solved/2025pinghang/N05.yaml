  question_id: "N05"
  question_text: "起早王手机蓝牙的制造商数据（格式：0x0102030405060708）"
  category_l1: "network_traffic"
  category_l2: "bluetooth_le"
  tags: ["ble_adv", "manufacturer_specific_data", "ch9140", "wch"]
  points: 10
  difficulty: "medium"

answer:
  value: "0x0701434839313430"
  value_type: "hex_blob"
  confidence: "medium"
  verified: true
  verified_method: "dominant_mfr_data_value"
  verified_date: "2026-05-04"
  alternative_answers:
    - value: "0x57ab0701434839313430"
      reason: "若 grader 要求包含 company_id 前缀 (LE 0x57 0xab)"

walkthrough:
  summary: "人为构造的 BLE 广播（name=Cracked, MAC=55:79:c6:86:8d:13）携带固定 8 字节 manufacturer data，ASCII 解码为 \\x07\\x01CH9140（WCH 蓝牙 HID 芯片型号）"
  steps:
    - seq: 1
      description: "Count manufacturer data occurrences"
      command: |
        tshark -r BLE -Y 'btcommon.eir_ad.entry.company_id' \
          -T fields -e btle.advertising_address -e btcommon.eir_ad.entry.company_id \
          -e btcommon.eir_ad.entry.data | sort | uniq -c | sort -rn
      tool: "tshark"
      expected_output: "55:79:c6:86:8d:13 / 0xab57 / 0701434839313430 × 2457 (99.5%)"
    - seq: 2
      description: "Decode 0701434839313430 as ASCII"
      command: "echo '0701434839313430' | xxd -r -p"
      tool: "xxd"
      expected_output: "\\x07\\x01CH9140"
      human_note: "CH9140 是 WCH 的 BLE HID 模块芯片，用于 BadBT/BadUSB"
  evidence_path: "BLE pcapng → ADV_IND from 55:79:c6:86:8d:13"

tools_used:
  - name: "tshark"
    version: "3.6.2"
  - name: "xxd"
    version: "any"

ai_meta:
  first_solved_by: "cascade"
