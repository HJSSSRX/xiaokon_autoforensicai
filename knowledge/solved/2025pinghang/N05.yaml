      correction: "题目格式 0x+16hex 暗示 8 字节，纯 data 部分"
    - mistake: "把 nRF Sniffer 自己的 timestamp 当制造商数据"
      correction: "manufacturer data 在 AD entry 里，不在 pcapng header"
